name: vcpkg Build

on:
  schedule:
    - cron: '0 0 * * 6'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  pre-checks:
    name: Pre-Checks
    uses: ./.github/workflows/pre-checks.yml

  vcpkg-build:
    needs: pre-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            triplet: x64-linux
          - platform: macos
            os: macos-14
            triplet: arm64-osx
          - platform: windows
            os: windows-2022
            triplet: x64-windows
          - platform: windows-static
            os: windows-2022
            triplet: x64-windows-static
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone vcpkg (latest)
        run: git clone https://github.com/microsoft/vcpkg.git ${{ github.workspace }}/vcpkg --depth 1

      - name: Bootstrap vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: ${{ github.workspace }}\vcpkg\bootstrap-vcpkg.bat

      - name: Verify pkg-config is NOT available (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if command -v pkg-config &>/dev/null; then
            echo "::warning::pkg-config is available — this may mask find module issues"
          else
            echo "pkg-config not found (expected on Windows CI)"
          fi

      - name: Install huira port
        run: >
          ${{ github.workspace }}/vcpkg/vcpkg install "huira[tools]"
          --overlay-ports=packaging/vcpkg-port
          --triplet=${{ matrix.triplet }}

      - name: Test find_package (single-config / Ninja)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd tests/packaging
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}/packaging/vcpkg-port" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          cmake --build . --config Release
          ctest --output-on-failure -C Release

      - name: Test find_package (multi-config / Visual Studio)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd tests/packaging
          mkdir build && cd build
          TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          OVERLAY_PORTS="${{ github.workspace }}/packaging/vcpkg-port"
          # Convert backslashes to forward slashes (needed on Windows Git Bash)
          TOOLCHAIN_FILE="${TOOLCHAIN_FILE//\\//}"
          OVERLAY_PORTS="${OVERLAY_PORTS//\\//}"
          cmake .. \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DVCPKG_OVERLAY_PORTS="$OVERLAY_PORTS" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          cmake --build . --config Release
          ctest --output-on-failure -C Release
          # Also build Debug to exercise multi-config
          cmake --build . --config Debug
          ctest --output-on-failure -C Debug

  vcpkg-ci:
    name: vcpkg CI
    if: always()
    needs:
      - pre-checks
      - vcpkg-build
    runs-on: ubuntu-22.04
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or were skipped successfully"
