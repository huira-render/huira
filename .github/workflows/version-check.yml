name: Version Check

on:
  workflow_call:

jobs:
  version-check:
    runs-on: ubuntu-22.04
    name: Version Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version consistency
        run: |
          set -e

          # Read version from VERSION file
          VERSION_FILE=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION_FILE"

          # Read version from meta.yaml
          # Try Jinja2 format first: {% set version = "x.y.z" %}
          # Then fall back to direct YAML format: version: x.y.z
          META_VERSION=$(grep -oP '{%\s*set\s+version\s*=\s*"\K[^"]+' packaging/recipe/meta.yaml 2>/dev/null || \
                         grep -oP '^\s*version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' packaging/recipe/meta.yaml | head -1)
          echo "meta.yaml version: $META_VERSION"

          # Always check VERSION matches meta.yaml
          if [ "$VERSION_FILE" != "$META_VERSION" ]; then
            echo "::error::Version mismatch: VERSION file ($VERSION_FILE) != meta.yaml ($META_VERSION)"
            exit 1
          fi

          # Only check git tag when triggered by a tag push
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            TAG_VERSION="${TAG_VERSION#v}"
            echo "Tag push detected — checking tag version: $TAG_VERSION"

            if [ "$VERSION_FILE" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch: VERSION file ($VERSION_FILE) != tag ($TAG_VERSION)"
              exit 1
            fi
            echo "All versions (file, meta.yaml, tag) are consistent"
          else
            echo "Not a tag push — skipping tag version check"
            echo "VERSION and meta.yaml are consistent"
          fi
