name: Pre-Checks

on:
  push:
  workflow_call:

jobs:
  format-check:
    name: Clang-Format Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: python3 -m pip install clang-format==17.0.6

      - name: Run Formatting Check
        run: |
          echo "Checking formatting for .cpp, .hpp, .cc, .h, and .ipp files..."
          find . -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.cc" -o -name "*.h" -o -name "*.ipp" \) -exec clang-format --style=file --dry-run --Werror {} +

  version-check:
    name: Version Check
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version consistency
        run: |
          set -e
          VERSION_FILE=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION_FILE"

          META_VERSION=$(grep -oP '{%\s*set\s+version\s*=\s*"\K[^"]+' packaging/recipe/meta.yaml 2>/dev/null || \
                         grep -oP '^\s*version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' packaging/recipe/meta.yaml | head -1)
          echo "meta.yaml version: $META_VERSION"

          if [ "$VERSION_FILE" != "$META_VERSION" ]; then
            echo "::error::Version mismatch: VERSION file ($VERSION_FILE) != meta.yaml ($META_VERSION)"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
            TAG_VERSION="${TAG_VERSION#v}"
            echo "Tag push detected — checking tag version: $TAG_VERSION"

            if [ "$VERSION_FILE" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch: VERSION file ($VERSION_FILE) != tag ($TAG_VERSION)"
              exit 1
            fi
            echo "All versions (file, meta.yaml, tag) are consistent"
          else
            echo "Not a tag push — skipping tag version check"
            echo "VERSION and meta.yaml are consistent"
          fi